<script>
// ═══════════════════════════════════════════════════════════════════
//  MR. GREEN — Sistema de Trial + Paywall
//  Controla acesso gratuito de 24h e redireciona para pagamento
// ═══════════════════════════════════════════════════════════════════
(function MrGreenAccess() {
  'use strict';

  var TRIAL_KEY    = 'mrgreen_trial';
  var SESSION_KEY  = 'mrgreen_session';
  var TRIAL_MS     = 24 * 60 * 60 * 1000;

  function getTrialData() {
    try { return JSON.parse(localStorage.getItem(TRIAL_KEY)); } catch(e) { return null; }
  }
  function getSessionData() {
    try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch(e) { return null; }
  }
  function hasValidSession() {
    var d = getSessionData();
    if (!d || !d.plan || !d.email) return false;
    if (d.plan === 'lifetime') return true;
    if (d.plan === 'monthly') {
      if (d.expires_at) return new Date(d.expires_at) > new Date();
      return Date.now() < d.checked + 30 * 24 * 60 * 60 * 1000;
    }
    return false;
  }
  function startTrial() {
    localStorage.setItem(TRIAL_KEY, JSON.stringify({ start: Date.now(), version: 1 }));
  }
  function isTrialExpired(d) { return Date.now() > d.start + TRIAL_MS; }
  function getRemaining(d)   { return Math.max(0, (d.start + TRIAL_MS) - Date.now()); }
  function formatMs(ms) {
    var h = Math.floor(ms / 3600000);
    var m = Math.floor((ms % 3600000) / 60000);
    var s = Math.floor((ms % 60000) / 1000);
    return String(h).padStart(2,'0') + 'h ' + String(m).padStart(2,'0') + 'm ' + String(s).padStart(2,'0') + 's';
  }

  if (hasValidSession()) return;

  var trial = getTrialData();
  if (!trial) {
    startTrial();
    trial = getTrialData();
    injectTrialBanner(getRemaining(trial), true);
    return;
  }
  if (isTrialExpired(trial)) {
    window.location.href = 'paywall.html';
    return;
  }
  injectTrialBanner(getRemaining(trial), false);

  function injectTrialBanner(remaining, isFirst) {
    var inject = function() {
      var styles = '<style id="mrgreen-trial-style">' +
        '#mrgreen-trial-bar{position:fixed;top:0;left:0;right:0;z-index:9999;' +
        'background:linear-gradient(135deg,#0a0a0c,#111114);' +
        'border-bottom:1px solid rgba(34,197,94,.25);' +
        'padding:10px 20px;display:flex;align-items:center;' +
        'justify-content:space-between;flex-wrap:wrap;gap:10px;' +
        'font-family:"DM Sans",system-ui,sans-serif;' +
        'box-shadow:0 4px 32px rgba(0,0,0,.7);}' +
        '#mrgreen-trial-bar .tbar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}' +
        '#mrgreen-trial-bar .tbar-pulse{width:8px;height:8px;border-radius:50%;background:#22C55E;flex-shrink:0;' +
        'box-shadow:0 0 8px #22C55E;animation:mgpulse 1.5s ease-in-out infinite;}' +
        '@keyframes mgpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}' +
        '#mrgreen-trial-bar .tbar-text{color:#9CA3AF;font-size:.82rem;line-height:1.4;}' +
        '#mrgreen-trial-bar .tbar-text strong{color:#fff;}' +
        '#mrgreen-trial-bar .tbar-countdown{font-weight:700;color:#22C55E;font-variant-numeric:tabular-nums;font-size:.9rem;letter-spacing:.02em;}' +
        '#mrgreen-trial-bar .tbar-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}' +
        '#mrgreen-trial-bar .tbar-login{background:transparent;border:1px solid rgba(255,255,255,.12);color:#6B7280;border-radius:6px;padding:6px 12px;font-size:.76rem;cursor:pointer;font-family:inherit;transition:all .2s;}' +
        '#mrgreen-trial-bar .tbar-login:hover{border-color:#22C55E;color:#22C55E;}' +
        '#mrgreen-trial-bar .tbar-btn{background:linear-gradient(135deg,#22C55E,#16A34A);color:#fff;border:none;border-radius:6px;padding:7px 16px;font-weight:600;font-size:.8rem;cursor:pointer;white-space:nowrap;font-family:inherit;box-shadow:0 0 16px rgba(34,197,94,.3);transition:opacity .2s;}' +
        '#mrgreen-trial-bar .tbar-btn:hover{opacity:.88;}' +
        'body{padding-top:52px!important;}' +
        '#mg-modal{position:fixed;inset:0;z-index:10001;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;padding:16px;font-family:"DM Sans",system-ui,sans-serif;backdrop-filter:blur(4px);}' +
        '#mg-modal.open{display:flex;}' +
        '#mg-modal .mbox{background:#0f0f12;border:1px solid rgba(34,197,94,.2);border-radius:16px;padding:32px 28px;max-width:380px;width:100%;position:relative;box-shadow:0 0 60px rgba(34,197,94,.08);}' +
        '#mg-modal .mcls{position:absolute;top:14px;right:16px;background:none;border:none;color:#4B5563;font-size:1.1rem;cursor:pointer;transition:color .2s;}' +
        '#mg-modal .mcls:hover{color:#9CA3AF;}' +
        '#mg-modal h3{font-weight:700;font-size:1rem;color:#fff;margin-bottom:3px;}' +
        '#mg-modal .msub{font-size:.8rem;color:#6B7280;margin-bottom:18px;}' +
        '#mg-modal input{width:100%;background:#080809;border:1px solid #1f1f24;border-radius:8px;padding:11px 14px;color:#fff;font-size:.9rem;font-family:inherit;outline:none;box-sizing:border-box;margin-bottom:10px;transition:border-color .2s;}' +
        '#mg-modal input:focus{border-color:#22C55E;}' +
        '#mg-modal .mmsg{font-size:.8rem;min-height:16px;margin-bottom:10px;}' +
        '#mg-modal .msbtn{width:100%;background:linear-gradient(135deg,#22C55E,#16A34A);color:#fff;border:none;border-radius:8px;padding:12px;font-weight:600;font-size:.9rem;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px rgba(34,197,94,.25);}' +
        '#mg-modal .msbtn:disabled{opacity:.5;cursor:not-allowed;}' +
        '</style>';
      document.head.insertAdjacentHTML('beforeend', styles);

      // Modal
      var modal = document.createElement('div');
      modal.id = 'mg-modal';
      modal.innerHTML = '<div class="mbox"><button class="mcls" onclick="MgClose()">&times;</button>' +
        '<h3>&#128273; Ja sou Assinante</h3>' +
        '<p class="msub">Digite o e-mail usado no pagamento</p>' +
        '<input id="mg-em" type="email" placeholder="seu@email.com"/>' +
        '<div class="mmsg" id="mg-msg"></div>' +
        '<button class="msbtn" id="mg-sb" onclick="MgLogin()">Verificar acesso</button></div>';
      document.body.appendChild(modal);
      document.getElementById('mg-em').addEventListener('keydown', function(e){ if(e.key==='Enter') window.MgLogin(); });

      // Bar
      var bar = document.createElement('div');
      bar.id = 'mrgreen-trial-bar';
      var msg = isFirst
        ? '<strong>Bem-vindo! 24h gratuitas iniciadas.</strong> Encerra em: <span class="tbar-countdown" id="tbar-cd">' + formatMs(remaining) + '</span>'
        : 'Periodo gratuito encerra em: <span class="tbar-countdown" id="tbar-cd">' + formatMs(remaining) + '</span>';
      bar.innerHTML =
        '<div class="tbar-left"><span class="tbar-pulse"></span>' +
        '<div class="tbar-text">' + msg + '</div></div>' +
        '<div class="tbar-actions">' +
        '<button class="tbar-login" onclick="MgOpen()">Ja sou assinante</button>' +
        '<button class="tbar-btn" onclick="window.location.href=\'paywall.html\'">Assinar agora</button>' +
        '</div>';
      document.body.prepend(bar);

      var ms = remaining;
      var tick = setInterval(function() {
        ms -= 1000;
        var el = document.getElementById('tbar-cd');
        if (!el) { clearInterval(tick); return; }
        if (ms <= 0) { clearInterval(tick); window.location.href = 'paywall.html'; return; }
        el.textContent = formatMs(ms);
      }, 1000);
    };
    if (document.readyState === 'complete') inject();
    else window.addEventListener('load', inject);
  }

  window.MgOpen = function() {
    var m = document.getElementById('mg-modal');
    if (m) { m.className = 'open'; setTimeout(function(){ var e = document.getElementById('mg-em'); if(e) e.focus(); }, 80); }
  };
  window.MgClose = function() {
    var m = document.getElementById('mg-modal'); if(m) m.className = '';
    var msg = document.getElementById('mg-msg'); if(msg) msg.textContent = '';
    var i = document.getElementById('mg-em'); if(i) i.value = '';
  };
  window.MgLogin = async function() {
    var SB_URL = 'https://lgwqjhydasdnxxalpglm.supabase.co';
    var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxnd3FqaHlkYXNkbnh4YWxwZ2xtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1NzkwNTUsImV4cCI6MjA5MzE1NTA1NX0.c5Pu51dQwWAwYOIJRQgJVG8MApBpmg_k_r8A9Ip_bRM';
    var i=document.getElementById('mg-em'), msg=document.getElementById('mg-msg'), btn=document.getElementById('mg-sb');
    if(!i||!msg||!btn) return;
    var email=i.value.trim().toLowerCase();
    if(!email||email.indexOf('@')<0){msg.style.color='#EF4444';msg.textContent='Digite um e-mail valido.';return;}
    btn.textContent='Verificando...';btn.disabled=true;msg.style.color='#6B7280';msg.textContent='Consultando...';
    try {
      var r=await fetch(SB_URL+'/rest/v1/users?email=eq.'+encodeURIComponent(email)+'&select=*',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
      var d=await r.json(); var user=d&&d.length>0?d[0]:null;
      if(!user){msg.style.color='#EF4444';msg.textContent='E-mail nao encontrado.';btn.textContent='Verificar acesso';btn.disabled=false;return;}
      var active=user.plan==='lifetime'||(user.plan==='monthly'&&user.expires_at&&new Date(user.expires_at)>new Date());
      if(!active){msg.style.color='#EF4444';msg.textContent='Plano expirado.';btn.textContent='Verificar acesso';btn.disabled=false;return;}
      localStorage.setItem(SESSION_KEY,JSON.stringify({email:user.email,plan:user.plan,checked:Date.now(),expires_at:user.expires_at||null}));
      msg.style.color='#22C55E';msg.textContent='Acesso liberado!';
      setTimeout(function(){window.location.reload();},900);
    } catch(e){msg.style.color='#EF4444';msg.textContent='Erro de conexao.';btn.textContent='Verificar acesso';btn.disabled=false;}
  };

})();
